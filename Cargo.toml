[package]
name = "etch"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
metal = "0.32"
objc = "0.2"
cocoa = "0.26"
winit = "0.30"
bytemuck = { version = "1", features = ["derive"] }
bitflags = "2"
bitvec = "1"
core-foundation = "0.10"
core-graphics = "0.23"
core-graphics-types = "0.2"
core-text = "20"
foreign-types = "0.5"
log = "0.4"
env_logger = "0.11"
libc = "0.2"
nix = { version = "0.29", features = ["term", "ioctl", "signal", "event", "process"] }

[profile.release]
opt-level = 3
lto = "thin"
