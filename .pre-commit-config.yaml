repos:
- repo: local
  hooks:
    - id: cargo-fmt
      name: cargo fmt
      entry: cargo fmt --all
      language: system
      types: [rust]
      pass_filenames: false

    - id: cargo-clippy
      name: cargo clippy
      entry: cargo clippy --quiet --all-targets --all-features -- -D warnings
      language: system
      types: [rust]
      pass_filenames: false
