name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  dist:
    name: build dist
    runs-on: macos-26
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: test
        run: |
          make test-ci

      - name: build dist
        run: |
          make dist

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: release-${{ github.sha }}
        run: |
          gh release create "$RELEASE_TAG" "tty.app.zip#tty-aarch64-apple-darwin.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG"
