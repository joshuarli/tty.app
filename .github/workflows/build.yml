name: Build

# gh api repos/joshuarli/tty/actions/permissions/workflow --method PUT
#   --field default_workflow_permissions=write

on:
  push:
    tags:
      - 'release/*'

jobs:
  build:
    name: Build release
    runs-on: macos-15
    timeout-minutes: 10
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: test and release
        run: |
          make test-ci
          make release

      - name: Generate icon
        run: make icon

      - name: Bundle .app
        run: |
          mkdir -p tty.app/Contents/MacOS tty.app/Contents/Resources
          cp Info.plist tty.app/Contents/
          cp icon.icns tty.app/Contents/Resources/
          cp target/aarch64-apple-darwin/release/tty tty.app/Contents/MacOS/
          zip -r "tty-${{ github.ref_name }}-aarch64-apple-darwin.zip" tty.app

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" "tty-${{ github.ref_name }}-aarch64-apple-darwin.zip" --title "${{ github.ref_name }}"
